# AI Development Whitelist Configuration
# Includes AI APIs, package managers, documentation, and version control
# Suitable for AI-assisted development workflows

# Package Managers
acl pypi_domain dstdomain .pypi.org .pythonhosted.org files.pythonhosted.org
acl npm_domain dstdomain registry.npmjs.org .npmjs.org .yarnpkg.com
acl pypi_paths urlpath_regex ^/simple/ ^/packages/
acl npm_paths urlpath_regex ^/[^/]+$ ^/[^/]+/-/ ^/@[^/]+/[^/]+$

# Documentation
acl docs_python dstdomain docs.python.org
acl docs_mdn dstdomain developer.mozilla.org
acl docs_nodejs dstdomain nodejs.org
acl docs_general dstdomain stackoverflow.com stackexchange.com
acl http_methods_readonly method GET HEAD OPTIONS

# Version Control
acl github_domain dstdomain github.com .github.com raw.githubusercontent.com .githubusercontent.com
acl gitlab_domain dstdomain gitlab.com .gitlab.com

# AI APIs
acl ai_openai dstdomain api.openai.com
acl ai_anthropic dstdomain api.anthropic.com
acl ai_google dstdomain generativelanguage.googleapis.com

# Block expensive AI models (optional)
# acl expensive_models urlpath_regex gpt-4 claude-opus
# http_access deny expensive_models

# Access Rules
http_access allow internal_network pypi_domain pypi_paths
http_access allow internal_network npm_domain npm_paths
http_access allow internal_network docs_python http_methods_readonly
http_access allow internal_network docs_mdn http_methods_readonly
http_access allow internal_network docs_nodejs http_methods_readonly
http_access allow internal_network docs_general http_methods_readonly
http_access allow internal_network github_domain
http_access allow internal_network gitlab_domain
http_access allow internal_network ai_openai
http_access allow internal_network ai_anthropic
http_access allow internal_network ai_google
http_access deny all
