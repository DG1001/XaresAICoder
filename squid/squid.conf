# Squid Proxy Configuration for XaresAICoder
# Provides network access control and logging for workspace containers

# Network Configuration
# Listen on port 3128 (Docker internal network)
http_port 3128

# Note: SSL bumping (HTTPS inspection) is not enabled in this configuration
# The ubuntu/squid image doesn't include SSL support by default
# Domain-based filtering still works for HTTPS, but URL path filtering only works for HTTP

# Cache Configuration
# Disable caching for simpler configuration and privacy
cache deny all

# Access Control Lists (ACLs)
# ============================================

# Standard local network definitions (required by debian.conf)
acl localnet src 10.0.0.0/8        # RFC 1918 local private network
acl localnet src 172.16.0.0/12     # RFC 1918 local private network
acl localnet src 192.168.0.0/16    # RFC 1918 local private network
acl localnet src fc00::/7          # RFC 4193 local private network range
acl localnet src fe80::/10         # RFC 4291 link-local machines

# Safe ports (standard HTTP/HTTPS)
acl SSL_ports port 443
acl Safe_ports port 80          # HTTP
acl Safe_ports port 443         # HTTPS
acl CONNECT method CONNECT

# Internal network (workspace containers)
# Note: Default is 172.30.0.0/16, configurable via INTERNAL_NETWORK_SUBNET
acl internal_network src 172.30.0.0/16

# HTTP Methods
acl http_methods_safe method GET HEAD
acl http_methods_readonly method GET HEAD OPTIONS
acl http_methods_write method POST PUT PATCH DELETE

# ============================================
# Whitelist ACLs - CUSTOMIZE THESE
# ============================================

# Package Managers (essential for development)
# Note: .domain.com matches both domain.com and *.domain.com
acl pypi_domain dstdomain .pypi.org
acl pypi_bare dstdomain pypi.org  # Bare domain separate ACL
acl pythonhosted_cdn dstdomain .pythonhosted.org  # CDN for package files
acl npm_domain dstdomain .npmjs.org .yarnpkg.com
acl npm_registry dstdomain registry.npmjs.org registry.yarnpkg.com

# APT Package Repositories (for Debian/Ubuntu system packages)
acl apt_debian dstdomain .debian.org deb.debian.org
acl apt_ubuntu dstdomain .ubuntu.com archive.ubuntu.com security.ubuntu.com
acl apt_nodesource dstdomain deb.nodesource.com

# Maven Repositories (for Java dependency management)
# NOTE: Workspaces are auto-configured to use official repositories only (Maven Central, Google Maven)
# If you need additional mirrors (e.g., regional mirrors like Aliyun), add them here AND update
# workspace settings: ~/.m2/settings.xml (Maven) and ~/.gradle/init.gradle (Gradle)
acl maven_central dstdomain .maven.org repo.maven.apache.org repo1.maven.org central.maven.org
acl maven_apache dstdomain .apache.org archive.apache.org dlcdn.apache.org
acl maven_google dstdomain dl.google.com .maven.google.com
acl maven_other dstdomain repo.spring.io jitpack.io

# Optional: Regional mirrors (commented out by default - uncomment if needed)
# acl maven_aliyun dstdomain .aliyun.com maven.aliyun.com

# VS Code Extension Marketplace
acl vscode_extensions dstdomain .open-vsx.org .openvsx.org .eclipsecontent.org

# Package manager paths (API only, not web browsing)
acl pypi_paths urlpath_regex ^/simple/
acl pypi_paths urlpath_regex ^/packages/
acl npm_paths urlpath_regex ^/[^/]+$
acl npm_paths urlpath_regex ^/[^/]+/-/
acl npm_paths urlpath_regex ^/@[^/]+/[^/]+$

# Documentation (read-only)
acl docs_python dstdomain docs.python.org
acl docs_mdn dstdomain developer.mozilla.org
acl docs_nodejs dstdomain nodejs.org
acl docs_general dstdomain stackoverflow.com
acl docs_general dstdomain stackexchange.com

# Version Control (GitHub, GitLab)
# Note: .domain.com matches both domain.com and *.domain.com
acl github_domain dstdomain .github.com
acl github_domain dstdomain github.com
acl github_domain dstdomain .githubusercontent.com
acl github_domain dstdomain githubusercontent.com
acl github_domain dstdomain release-assets.githubusercontent.com
acl gitlab_domain dstdomain .gitlab.com

# Restrict GitHub to API and Git operations (optional - comment out to allow full access)
# acl github_api_paths urlpath_regex ^/api/
# acl github_git_paths urlpath_regex \.git/

# AI APIs and Tools (for pre-installed coding assistants)
acl ai_openai dstdomain .openai.com
acl ai_anthropic dstdomain .anthropic.com
acl ai_google dstdomain .googleapis.com .google.dev
acl ai_opencode dstdomain .opencode.ai
acl ai_huggingface dstdomain .huggingface.co
acl ai_ollama dstdomain .ollama.ai .ollama.com
acl ai_glm dstdomain .z.ai

# Block expensive AI models (example - requires URL inspection)
# acl expensive_models urlpath_regex gpt-4
# acl expensive_models urlpath_regex claude-opus

# ============================================
# Access Rules (Order Matters!)
# ============================================

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow localhost (for health checks)
http_access allow localhost

# Package Managers
http_access allow internal_network pypi_domain pypi_paths  # PyPI API (with path restrictions)
http_access allow internal_network pypi_bare  # Bare pypi.org domain
http_access allow internal_network pythonhosted_cdn  # PyPI CDN for package files (no path restrictions)
http_access allow internal_network npm_domain npm_paths
http_access allow internal_network npm_registry  # Full registry access (no path restrictions)

# APT Package Repositories
http_access allow internal_network apt_debian
http_access allow internal_network apt_ubuntu
http_access allow internal_network apt_nodesource

# Maven Repositories
http_access allow internal_network maven_central
http_access allow internal_network maven_apache
http_access allow internal_network maven_google
http_access allow internal_network maven_other
# http_access allow internal_network maven_aliyun  # Uncomment if you enabled maven_aliyun ACL above

# VS Code Extensions
http_access allow internal_network vscode_extensions

# Documentation (read-only)
http_access allow internal_network docs_python http_methods_readonly
http_access allow internal_network docs_mdn http_methods_readonly
http_access allow internal_network docs_nodejs http_methods_readonly
http_access allow internal_network docs_general http_methods_readonly

# Version Control (full access)
http_access allow internal_network github_domain
http_access allow internal_network gitlab_domain

# AI APIs and Tools (enabled for pre-installed coding assistants)
http_access allow internal_network ai_openai
http_access allow internal_network ai_anthropic
http_access allow internal_network ai_google
http_access allow internal_network ai_opencode
http_access allow internal_network ai_huggingface
http_access allow internal_network ai_ollama
http_access allow internal_network ai_glm

# Block expensive models (uncomment to enable)
# http_access deny expensive_models

# DENY ALL OTHER TRAFFIC
http_access deny all

# Include additional configuration files from Ubuntu package
include /etc/squid/conf.d/*.conf

# ============================================
# Logging Configuration
# ============================================

# Access log format with detailed information
logformat detailed %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt

# Access log location
access_log /var/log/squid/access.log detailed

# Cache log (disabled since we're not caching)
cache_log /var/log/squid/cache.log

# Store log (disabled since we're not caching)
# cache_store_log none

# ============================================
# Performance Tuning
# ============================================

# Maximum object size (not cached, but affects downloads)
maximum_object_size 512 MB

# DNS configuration
dns_nameservers 8.8.8.8 8.8.4.4

# Connection timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 30 seconds

# ============================================
# Security
# ============================================

# Don't reveal Squid version
httpd_suppress_version_string on

# Forwarded headers (privacy)
forwarded_for on
via on

# ============================================
# Debugging (uncomment for troubleshooting)
# ============================================
# debug_options ALL,1 33,2 28,9
